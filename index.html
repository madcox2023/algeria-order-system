<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>إتمام الطلب</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="container">

<h1>إتمام الطلب</h1>

<p class="subtitle">

املأ المعلومات وسيتم التواصل معك لتأكيد الطلب.

</p>

<form id="orderForm">

<input
type="text"
id="name"
placeholder="الاسم الكامل"
required>

<input
type="tel"
id="phone"
placeholder="رقم الهاتف"
required>

<select id="wilaya">

<option value="">اختر الولاية</option>

</select>

<select id="commune">

<option value="">اختر البلدية</option>

</select>

<textarea
id="address"
placeholder="العنوان الكامل"
required></textarea>
<div class="shipping-box">

<label>طريقة التوصيل</label>

<select id="shippingType">

<option value="home">إلى المنزل</option>

<option value="desk">إلى المكتب</option>

</select>

</div>

<div class="quantity-box">

<label>الكمية</label>

<div class="qty-controls">

<button type="button" id="minus">-</button>

<span id="qty">1</span>

<button type="button" id="plus">+</button>

</div>

</div>

<div class="price-box">

<p>

سعر المنتج

<span id="productPrice">

3500 دج

</span>

</p>

<p>

سعر الشحن

<span id="shippingPrice">

0 دج

</span>

</p>

<hr>

<p class="total">

الإجمالي

<span id="totalPrice">

3500 دج

</span>

</p>

</div>
<button type="submit">

تأكيد الطلب

</button>

</form>

</div>

<script src="js/ui.js"></script>

<script type="module" src="js/order.js"></script>

</body>

</html>
